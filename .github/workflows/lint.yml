name: lint

on:
  pull_request:
  push:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repository
        uses: actions/checkout@v6

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Verify formatting first; oxfmt covers JS/TS and the Markdown/MDX, CSS,
      # JSON, and YAML sources before the linters run.
      - name: Check formatting (oxfmt)
        run: pnpm run format:check

      # Type-aware lint via oxlint + oxlint-tsgolint (TypeScript native engine).
      - name: Lint JS/TS (oxlint)
        run: pnpm run lint

      - name: Proofread Markdown/MDX (textlint)
        run: pnpm run lint:text
