# Git hooks managed by lefthook.
# `lefthook install` (wired into the `prepare` npm script) enables the hooks.
pre-commit:
  # Run jobs sequentially so oxfmt formats files before the linters inspect them.
  # A non-zero exit from any job aborts the commit.
  piped: true
  jobs:
    # 1. Format staged code and docs with oxfmt, then re-stage the formatted files.
    - name: oxfmt
      glob: "*.{js,jsx,mjs,cjs,ts,tsx,mts,cts,md,mdx,css,json,jsonc,yaml,yml}"
      run: pnpm exec oxfmt --write {staged_files}
      stage_fixed: true
    # 2. Lint JS/TS with oxlint (type-aware, warnings as errors via the `lint`
    #    script). Run on the whole project so type information resolves across
    #    files, gated on staged JS/TS changes.
    - name: oxlint
      glob: "*.{js,jsx,mjs,cjs,ts,tsx,mts,cts}"
      run: pnpm run lint
    # 3. Proofread staged Markdown/MDX with textlint after oxfmt has formatted them.
    - name: textlint
      glob: "*.{md,mdx}"
      run: pnpm exec textlint {staged_files}
